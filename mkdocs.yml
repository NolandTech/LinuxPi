site_name: 
site_url: http://www.linuxpi.ca

theme:
  name: material
  copyright: © 2026 NolandTech
  custom_dir: overrides
  logo: https://raw.githubusercontent.com/NolandTech/Images-/refs/heads/main/linuxpilogo2.png
  favicon: https://raw.githubusercontent.com/NolandTech/Images-/refs/heads/main/linuxpi-favicon-color.ico
  # icon:
  #   logo: fontawesome/solid/jedi
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    # Dark Mode
    - scheme: slate  # Enable dark mode
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: green
      accent: deep purple
    # Light Mode
    - scheme: default  # Enable light mode
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: blue
      accent: deep orange
  features:
    - content.code.copy
    - content.code.select
    

markdown_extensions:
  - toc:
      toc_depth: 2
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tasklist
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
          
extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js
  - https://unpkg.com/mermaid/dist/mermaid.initialize.js      

extra_css:
  - stylesheets/extra.css  

plugins:
  - search
  - git-revision-date-localized:
      type: date
  - macros
  - minify
  - awesome-pages

extra:
  domain_name: "LinuxPi.ca"
  server_ip: "192.168.0.xxx"